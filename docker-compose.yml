services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    env_file:
      - .env.production
    volumes:
      - uploads_data:/app/public/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.sigma-backend.rule=Host(`api.sigma.srv1415334.hstgr.cloud`)"
      - "traefik.http.routers.sigma-backend.entrypoints=https"
      - "traefik.http.routers.sigma-backend.tls=true"
      - "traefik.http.routers.sigma-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sigma-backend.middlewares=compress@file"
      - "traefik.http.services.sigma-backend.loadbalancer.server.port=3000"
      - "traefik.http.routers.sigma-backend-http.rule=Host(`api.sigma.srv1415334.hstgr.cloud`)"
      - "traefik.http.routers.sigma-backend-http.entrypoints=http"
      - "traefik.http.routers.sigma-backend-http.middlewares=https-redirect@file"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.sigma.srv1415334.hstgr.cloud
        NEXT_PUBLIC_FRONTEND_URL: https://sigma.srv1415334.hstgr.cloud
    restart: unless-stopped
    expose:
      - "3001"
    depends_on:
      - backend
    networks:
      - coolify
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=coolify"
      - "traefik.http.routers.sigma-frontend.rule=Host(`sigma.srv1415334.hstgr.cloud`)"
      - "traefik.http.routers.sigma-frontend.entrypoints=https"
      - "traefik.http.routers.sigma-frontend.tls=true"
      - "traefik.http.routers.sigma-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.sigma-frontend.middlewares=compress@file"
      - "traefik.http.services.sigma-frontend.loadbalancer.server.port=3001"
      - "traefik.http.routers.sigma-frontend-http.rule=Host(`sigma.srv1415334.hstgr.cloud`)"
      - "traefik.http.routers.sigma-frontend-http.entrypoints=http"
      - "traefik.http.routers.sigma-frontend-http.middlewares=https-redirect@file"

  omr_service:
    build:
      context: ./omr_service
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "5000"
    networks:
      - coolify

networks:
  coolify:
    external: true

volumes:
  uploads_data:
